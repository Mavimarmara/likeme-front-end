name: Build & Submit to Stores

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.prettierrc'
      - '.prettierignore'
      - '.editorconfig'

  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pular testes?'
        required: false
        default: false
        type: boolean
      submit_to_stores:
        description: 'Enviar para TestFlight/Play Store?'
        required: false
        default: false
        type: boolean

env:
  SKIP_IOS_POD_INSTALL: 'true'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar Sign in with Apple na config iOS (EAS capability sync)
        run: npm run assert:ios-apple-signin

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage --watchAll=false

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !failure() && !cancelled() }}
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.7.0
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Build Android (Production)
        id: build
        run: |
          set -euo pipefail
          OUTPUT=$(eas build --platform android --profile production --non-interactive --clear-cache --json)
          BUILD_ID=$(echo "$OUTPUT" | jq -r '.[0].id // empty')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "::error::eas build (Android) não retornou id de build."
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

  build-ios:
    name: Build iOS (Xcode Production)
    runs-on: macos-15
    needs: test
    if: ${{ !failure() && !cancelled() }}
    env:
      SKIP_IOS_POD_INSTALL: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Selecionar Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Mostrar versão do Xcode
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar Sign in with Apple na config iOS (EAS capability sync)
        run: npm run assert:ios-apple-signin

      - name: Xcode — build (Production)
        run: npm run ios:xcode:build:production

      - name: Xcode — archive (Production)
        run: npm run ios:xcode:archive:production

      - name: Upload Xcode archive (.xcarchive)
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ios/build/LikeMe.xcarchive
          if-no-files-found: error

  approve:
    name: Aprovar envio para lojas
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: >-
      ${{ always() && !cancelled() &&
          (github.event_name == 'push' || github.event.inputs.submit_to_stores != 'false') &&
          (needs.build-android.result == 'success' || needs.build-ios.result == 'success') }}
    environment: store-submit
    steps:
      - name: Aguardando aprovação
        run: echo "Deploy aprovado. Seguindo para submit."

  submit-android:
    name: Submit Android → Play Store
    runs-on: ubuntu-latest
    needs: [approve, build-android]
    if: >-
      ${{ always() && !cancelled() &&
          (github.event_name == 'push' || github.event.inputs.submit_to_stores != 'false') &&
          needs.build-android.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.7.0
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Create Google Service Account file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > ./google-service-account.json

      - name: Submit to Google Play (faixa internal; eas.json submit.production.android.track)
        run: |
          set -euo pipefail
          BUILD_ID='${{ needs.build-android.outputs.build_id }}'
          if [ -z "$BUILD_ID" ]; then
            echo "::error::build_id do job build-android está vazio; não use submit sem artefato deste pipeline."
            exit 1
          fi
          eas submit --platform android --profile production --id "$BUILD_ID" --non-interactive

  ios-appstore-pipeline:
    name: iOS App Store Pipeline
    runs-on: macos-15
    needs: [approve, build-ios]
    if: >-
      ${{ always() && !cancelled() &&
          (github.event_name == 'push' || github.event.inputs.submit_to_stores != 'false') &&
          needs.build-ios.result == 'success' }}
    env:
      SKIP_IOS_POD_INSTALL: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Selecionar Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Mostrar versão do Xcode
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Xcode archive
        uses: actions/download-artifact@v4
        with:
          name: ios-xcarchive
          path: archive-dl

      - name: Colocar .xcarchive no path do pipeline iOS
        run: |
          set -euo pipefail
          mkdir -p ios/build
          rm -rf ios/build/LikeMe.xcarchive
          if [ -d archive-dl/LikeMe.xcarchive ]; then
            mv archive-dl/LikeMe.xcarchive ios/build/LikeMe.xcarchive
          elif [ -d archive-dl/ios/build/LikeMe.xcarchive ]; then
            mv archive-dl/ios/build/LikeMe.xcarchive ios/build/LikeMe.xcarchive
          else
            echo "::error::LikeMe.xcarchive não encontrado no artefato ios-xcarchive."
            find archive-dl -maxdepth 5 -type d
            exit 1
          fi

      - name: Create App Store Connect API Key file
        run: echo '${{ secrets.ASC_API_KEY_P8 }}' > ./AuthKey_6QJ886URZD.p8

      - name: Export + Validate + Upload (App Store)
        run: |
          set -eo pipefail
          mkdir -p ci-logs
          npm run ios:xcode:export 2>&1 | tee ci-logs/ios-appstore-pipeline.log
          npm run ios:appstore:validate 2>&1 | tee -a ci-logs/ios-appstore-pipeline.log
          npm run ios:appstore:upload 2>&1 | tee -a ci-logs/ios-appstore-pipeline.log

      - name: Resumo de erro iOS (quando falhar)
        if: failure()
        run: |
          echo "===== Últimas 250 linhas do log iOS ====="
          tail -n 250 ci-logs/ios-appstore-pipeline.log || true
          echo "===== Linhas com 'error:' ====="
          grep -n "error:" ci-logs/ios-appstore-pipeline.log || true
          echo "===== Linhas com 'ARCHIVE FAILED' ====="
          grep -n "ARCHIVE FAILED" ci-logs/ios-appstore-pipeline.log || true

      - name: Upload log do pipeline iOS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-appstore-pipeline-log
          path: ci-logs/ios-appstore-pipeline.log
          if-no-files-found: warn
