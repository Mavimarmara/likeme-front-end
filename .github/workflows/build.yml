name: Build & Submit to Stores

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.prettierrc'
      - '.prettierignore'
      - '.editorconfig'

  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pular testes?'
        required: false
        default: false
        type: boolean
      submit_to_stores:
        description: 'Enviar para TestFlight/Play Store?'
        required: false
        default: false
        type: boolean

env:
  SKIP_IOS_POD_INSTALL: 'true'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar Sign in with Apple na config iOS (EAS capability sync)
        run: npm run assert:ios-apple-signin

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage --watchAll=false

  approve:
    name: Aprovar envio para lojas
    runs-on: ubuntu-latest
    needs: test
    if: >-
      ${{ !failure() && !cancelled() &&
          (github.event_name == 'push' || github.event.inputs.submit_to_stores != 'false') }}
    environment: store-submit
    steps:
      - name: Aguardando aprovação
        run: echo "Deploy aprovado. Seguindo para build e submit."

  build-android:
    name: Build Android (Gradle Production)
    runs-on: ubuntu-latest
    needs: approve
    if: ${{ !failure() && !cancelled() }}
    env:
      EXPO_PUBLIC_AUTH0_DOMAIN: 'likeme.us.auth0.com'
      EXPO_PUBLIC_AUTH0_CLIENT_ID: 'BoUNLHdItmGpq8rr1A4VS7ea2ceXsWPy'
      EXPO_PUBLIC_AUTH0_AUDIENCE: 'https://likeme.us.auth0.com/api/v2/'
      EXPO_PUBLIC_BACKEND_URL: 'https://likeme-back-end-one.vercel.app'
      EXPO_PUBLIC_USE_AUTH_PROXY: 'true'
      EXPO_PUBLIC_AUTH_SCHEME: 'likeme'
      EXPO_PUBLIC_AUTH_REDIRECT_PATH: 'auth'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar e decodificar keystore Android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          ANDROID_KEYSTORE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
        run: bash scripts/ci-android-release-signing.sh

      - name: Build AAB (bundleRelease)
        env:
          ANDROID_KEYSTORE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          ANDROID_KEYSTORE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_STORE_PASSWORD:-}" && -n "${ANDROID_KEYSTORE_PASSWORD:-}" ]]; then
            ANDROID_KEYSTORE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          fi
          if [[ -z "${ANDROID_KEYSTORE_KEY_PASSWORD:-}" && -n "${ANDROID_KEYSTORE_PASSWORD:-}" ]]; then
            ANDROID_KEYSTORE_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          fi
          if [[ -z "${ANDROID_KEYSTORE_KEY_PASSWORD:-}" && -n "${ANDROID_KEYSTORE_STORE_PASSWORD:-}" ]]; then
            ANDROID_KEYSTORE_KEY_PASSWORD="$ANDROID_KEYSTORE_STORE_PASSWORD"
          fi
          KEY_ALIAS="${ANDROID_KEYSTORE_KEY_ALIAS:-likeme-key-alias}"
          echo "Gradle key.alias=${KEY_ALIAS}"
          cd android && ./gradlew :app:bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEYSTORE_KEY_PASSWORD"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  build-ios:
    name: Build iOS (Xcode Production)
    runs-on: macos-15
    needs: approve
    if: ${{ !failure() && !cancelled() }}
    env:
      SKIP_IOS_POD_INSTALL: 'false'
      EXPO_PUBLIC_BACKEND_URL: 'https://likeme-back-end-one.vercel.app'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Selecionar Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Mostrar versão do Xcode
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar Sign in with Apple na config iOS (EAS capability sync)
        run: npm run assert:ios-apple-signin

      - name: Importar certificado de distribuição (iOS)
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Configurar App Store Connect API Key (assinatura Xcode)
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: bash scripts/ci-setup-asc-api-key.sh

      - name: Instalar provisioning profile (opcional, só App Store)
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: bash scripts/ci-install-ios-provisioning-profile.sh

      - name: Identidades de assinatura (diagnóstico)
        run: security find-identity -v -p codesigning | head -20 || true

      - name: CocoaPods (store / Production)
        run: npm run ios:pod-install:store

      - name: Xcode — build (Production)
        run: bash scripts/ci-xcode-production.sh build

      - name: Xcode — archive (Production)
        run: bash scripts/ci-xcode-production.sh archive

      - name: Xcode — export IPA (mesmo runner do archive)
        run: bash scripts/ci-xcode-production.sh export

      - name: Upload IPA (App Store)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/export/LikeMe.ipa
          if-no-files-found: error

      - name: Upload Xcode archive (.xcarchive)
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ios/build/LikeMe.xcarchive
          if-no-files-found: warn

  submit-android:
    name: Submit Android → Play Store
    runs-on: ubuntu-latest
    needs: build-android
    if: ${{ needs.build-android.result == 'success' }}
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: android-aab-dl

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          packageName: com.likeme.app
          releaseFiles: android-aab-dl/app-release.aab
          track: internal
          status: completed

  ios-appstore-pipeline:
    name: iOS App Store Pipeline
    runs-on: macos-15
    needs: build-ios
    if: ${{ needs.build-ios.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar App Store Connect API Key (validate/upload)
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: bash scripts/ci-setup-asc-api-key.sh

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ipa-dl

      - name: Colocar IPA no path esperado pelo altool
        run: |
          set -euo pipefail
          mkdir -p ios/build/export
          cp ipa-dl/LikeMe.ipa ios/build/export/LikeMe.ipa

      - name: Validate + Upload (App Store)
        run: |
          set -eo pipefail
          mkdir -p ci-logs
          npm run ios:appstore:validate 2>&1 | tee ci-logs/ios-appstore-pipeline.log
          npm run ios:appstore:upload 2>&1 | tee -a ci-logs/ios-appstore-pipeline.log

      - name: Resumo de erro iOS (quando falhar)
        if: failure()
        run: |
          echo "===== Últimas 250 linhas do log iOS ====="
          tail -n 250 ci-logs/ios-appstore-pipeline.log || true
          echo "===== Linhas com 'error:' ====="
          grep -n "error:" ci-logs/ios-appstore-pipeline.log || true
          echo "===== Linhas com 'ARCHIVE FAILED' ====="
          grep -n "ARCHIVE FAILED" ci-logs/ios-appstore-pipeline.log || true

      - name: Upload log do pipeline iOS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-appstore-pipeline-log
          path: ci-logs/ios-appstore-pipeline.log
          if-no-files-found: warn
