name: Build & Submit to Stores

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.prettierrc'
      - '.prettierignore'
      - '.editorconfig'

  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pular testes?'
        required: false
        default: 'false'
        type: boolean
      submit_to_stores:
        description: 'Enviar para TestFlight/Play Store?'
        required: false
        default: 'false'
        type: boolean

env:
  SKIP_IOS_POD_INSTALL: 'true'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar Sign in with Apple na config iOS (EAS capability sync)
        run: npm run assert:ios-apple-signin

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage --watchAll=false

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !failure() && !cancelled() }}
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.7.0
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Build Android (Production)
        id: build
        run: |
          set -euo pipefail
          OUTPUT=$(eas build --platform android --profile production --non-interactive --clear-cache --json)
          BUILD_ID=$(echo "$OUTPUT" | jq -r '.[0].id // empty')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "::error::eas build (Android) não retornou id de build."
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !failure() && !cancelled() }}
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar Sign in with Apple na config iOS (EAS capability sync)
        run: npm run assert:ios-apple-signin

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.7.0
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Build iOS (Production)
        id: build
        run: |
          set -euo pipefail
          OUTPUT=$(eas build --platform ios --profile production --non-interactive --clear-cache --json)
          BUILD_ID=$(echo "$OUTPUT" | jq -r '.[0].id // empty')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "::error::eas build (iOS) não retornou id de build."
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

  approve:
    name: Aprovar envio para lojas
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: >-
      ${{ !failure() && !cancelled() &&
          (github.event_name == 'push' || github.event.inputs.submit_to_stores != 'false') }}
    environment: store-submit
    steps:
      - name: Aguardando aprovação
        run: echo "Deploy aprovado. Seguindo para submit."

  submit-android:
    name: Submit Android → Play Store
    runs-on: ubuntu-latest
    needs: [approve, build-android]
    if: >-
      ${{ !failure() && !cancelled() &&
          (github.event_name == 'push' || github.event.inputs.submit_to_stores != 'false') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.7.0
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Create Google Service Account file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > ./google-service-account.json

      - name: Submit to Google Play (faixa internal; eas.json submit.production.android.track)
        run: |
          set -euo pipefail
          BUILD_ID='${{ needs.build-android.outputs.build_id }}'
          if [ -z "$BUILD_ID" ]; then
            echo "::error::build_id do job build-android está vazio; não use submit sem artefato deste pipeline."
            exit 1
          fi
          eas submit --platform android --profile production --id "$BUILD_ID" --non-interactive

  submit-ios:
    name: Submit iOS → TestFlight
    runs-on: ubuntu-latest
    needs: [approve, build-ios]
    if: >-
      ${{ !failure() && !cancelled() &&
          (github.event_name == 'push' || github.event.inputs.submit_to_stores != 'false') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.7.0
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Create App Store Connect API Key file
        run: echo '${{ secrets.ASC_API_KEY_P8 }}' > ./AuthKey_6QJ886URZD.p8

      - name: Submit to TestFlight
        run: |
          set -euo pipefail
          BUILD_ID='${{ needs.build-ios.outputs.build_id }}'
          if [ -z "$BUILD_ID" ]; then
            echo "::error::build_id do job build-ios está vazio; não use submit sem artefato deste pipeline."
            exit 1
          fi
          eas submit --platform ios --profile production --id "$BUILD_ID" --non-interactive
